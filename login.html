<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseTrades - Login</title>

<style>
body{
    margin:0;
    background:#0d1117;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    background:#161b22;
    padding:40px;
    border-radius:10px;
    width:340px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,208,132,.2);
}

h1{
    color:#00d084;
    margin-bottom:10px;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#00d084;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#00b36b;
}

a{
    color:#00d084;
    text-decoration:none;
}

.small{
    margin-top:20px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h1>PulseTrades</h1>

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button id="loginBtn">Login with Deriv</button>

<p class="small">
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

<p class="small">
<a href="index.html">Back to Home</a>
</p>

</div>

<script>
const CLIENT_ID = "33MqJooG5CpHcSnVy04Pb";

document.getElementById("loginBtn").addEventListener("click", function () {
    window.location.href =
        "https://oauth.deriv.com/oauth2/authorize?app_id=" +
        CLIENT_ID +
        "&l=EN&redirect_uri=" +
        encodeURIComponent("https://pulsetrades.onrender.com/callback.html");
});
