<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseTrades - Signing In</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
}
.box{
    text-align:center;
}
.spinner{
    width:50px;
    height:50px;
    border:5px solid #333;
    border-top:5px solid #00d084;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
    margin-bottom:20px;
}
@keyframes spin{
    100%{transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="box">
<div class="spinner"></div>
<h2>Signing you in...</h2>
<p>Please wait while PulseTrades connects to your Deriv account.</p>
</div>

<script>
// OAuth handling will be added here in the next step.
setTimeout(function(){
    window.location.href="../dashboard.html";
},2000);
</script>

</body>
</html>
